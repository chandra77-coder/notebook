name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Create Project and Build
        run: |
          # Create a new project to get clean boilerplate
          mkdir temp_build
          cd temp_build
          flutter create --project-name shopbook --platforms android .
          cd ..
          
          # Move boilerplate to root, but keep our code
          cp -r temp_build/android .
          cp temp_build/pubspec.yaml .
          rm -rf temp_build
          
          # Restore our original pubspec to keep dependencies
          git checkout pubspec.yaml
          
          # Build
          flutter pub get
          flutter build apk --release --no-codesign

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v1.0.0
          name: Release v1.0.0
          body: "ShopBook App - Ready to install APK"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
