name: Build and Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Initialize and Build APK
        run: |
          # Create a temporary project to get the boilerplate
          mkdir temp_project
          cd temp_project
          flutter create --project-name shopbook --platforms android .
          cd ..
          
          # Copy the boilerplate to the root, but keep our lib and pubspec
          cp -r temp_project/android .
          cp temp_project/pubspec.yaml .
          rm -rf temp_project
          
          # Restore our specific dependencies in pubspec.yaml
          # (We'll just overwrite it with our original one since it's already there)
          git checkout pubspec.yaml
          
          # Build the APK
          flutter pub get
          flutter build apk --release --no-codesign

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shopbook-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
