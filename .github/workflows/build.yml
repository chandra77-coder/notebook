name: Build and Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Create Project and Build
        run: |
          # We are in the root of the repo
          # Create a new project in a subfolder
          flutter create --project-name shopbook .
          
          # The above might fail if files exist, so let's be more surgical
          # But let's try to just run it and see.
          
          flutter pub get
          flutter build apk --release --no-codesign

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shopbook-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
