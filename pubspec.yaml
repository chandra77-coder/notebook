name: shopbook
description: A complete production-ready Flutter Android app for managing earnings, expenses, and profits with offline support.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  provider: ^6.0.0
  fl_chart: ^0.65.0
  uuid: ^4.0.0
  file_picker: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
